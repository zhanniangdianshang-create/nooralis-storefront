services:
  - type: web
    name: nooralis-storefront
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PAYPAL_ENVIRONMENT
        value: live
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PRODUCT_PRICE_CENTS
        value: "34900"
      - key: PRODUCT_CURRENCY
        value: usd
